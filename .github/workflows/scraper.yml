name: Manga Scraper & Compressor

on:
  push:
    paths:
      - 'config.js'
      - 'main.js'
      - 'scraper.js'
  workflow_dispatch:

jobs:
  scrape-and-compress:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout kode dari repositori kamu
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup environment Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Install dependencies
      - name: Install Dependencies
        run: npm ci

      # 4. Jalankan script scraper utama
      - name: Run Scraper
        run: npm start

      # 5. Bagi & Upload CBZ Artifacts secara otomatis (Batas Maksimal 50MB)
      - name: Split and Upload CBZ Artifacts
        run: |
          npm install @actions/artifact
          node split_upload.js
